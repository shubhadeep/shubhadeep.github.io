<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Shubhaeep Dhar</title>
    <style>
      :root {
        --sky1: #74c9ff;
        --sky2: #ffffff;
        --ink: #123;
        --muted: #4f5f6f;
        --grass1: #2f8f3a;
        --grass2: #1f6f2b;
        --grass3: #4cb85a;
      }

      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        min-height: 100vh;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Arial,
          sans-serif;
        color: var(--ink);
        background: linear-gradient(
          to bottom,
          var(--sky1) 0%,
          #dff3ff 28%,
          var(--sky2) 62%
        );
        overflow: hidden;
      }

      .page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 24px 110px;
        position: relative;
        z-index: 1;
      }

      .card {
        width: min(720px, 100%);
        padding: 32px 28px;
        background: rgba(255, 255, 255, 0.65);
        border: 1px solid rgba(18, 35, 51, 0.08);
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(18, 35, 51, 0.08);
        backdrop-filter: blur(6px);
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(2rem, 4vw, 3.2rem);
        line-height: 1.05;
        letter-spacing: -0.03em;
      }

      .role {
        margin: 0 0 18px;
        font-size: 1.05rem;
        color: var(--muted);
      }

      .contact {
        display: inline-flex;
        align-items: center;
        gap: 0.55rem;
        color: var(--ink);
        text-decoration: none;
        font-weight: 600;
        padding: 10px 14px;
        border-radius: 999px;
        border: 1px solid rgba(18, 35, 51, 0.1);
        background: rgba(255, 255, 255, 0.55);
      }

      .contact:hover {
        background: rgba(255, 255, 255, 0.85);
      }

      .grass {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        height: 140px;
        pointer-events: none;
        z-index: 2;
        overflow: hidden;
      }

      .blade {
        position: absolute;
        bottom: -10px;
        width: 2px;
        border-radius: 2px;
        transform-origin: bottom center;
        background: linear-gradient(to top, var(--grass2), var(--grass3));
        opacity: 0.95;
      }

      .blade::after {
        content: "";
        position: absolute;
        left: -1px;
        top: -6px;
        width: 4px;
        height: 10px;
        border-radius: 999px 999px 0 0;
        background: inherit;
        filter: brightness(1.05);
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="card" aria-label="Personal profile">
        <h1>Shubhadeep Dhar</h1>
        <p class="role">Architect at SAP</p>
        <a
          class="contact"
          href="https://www.linkedin.com/in/shubhadeepd/"
          target="_blank"
          rel="noopener noreferrer"
          >Contact</a
        >
      </section>
    </main>

    <div class="grass" aria-hidden="true" id="grass"></div>

    <script>
      (function () {
        const grass = document.getElementById("grass");
        const count = Math.max(36, Math.floor(window.innerWidth / 18));
        for (let i = 0; i < count; i++) {
          const blade = document.createElement("span");
          blade.className = "blade";
          const left = Math.random() * 100;
          const h = 40 + Math.random() * 90;
          const w = 1 + Math.random() * 2;
          const tilt =
            Math.random() * 24 -
            12 +
            (Math.random() > 0.5 ? 1 : -1) * Math.random() * 10;
          blade.style.left = left + "vw";
          blade.style.height = h + "px";
          blade.style.width = w + "px";
          blade.style.transform = `rotate(${tilt}deg)`;
          blade.style.opacity = String(0.55 + Math.random() * 0.45);
          grass.appendChild(blade);
        }
      })();
    </script>
  </body>
</html>
